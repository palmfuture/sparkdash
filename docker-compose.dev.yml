services:
  sparkdash:
    build:
      context: .
      dockerfile: Dockerfile.dev
      platforms:
        - linux/arm64
    container_name: sparkDash-dev
    restart: unless-stopped
    ports:
      - "5555:5555"   # Express API
      - "5173:5173"   # Vite HMR frontend
    volumes:
      # Full source — server --watch + Vite HMR, no rebuild for code edits
      - .:/app
      - /app/node_modules
      # Host metrics
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro
      - /usr/bin/nvidia-smi:/usr/bin/nvidia-smi:ro
      - /usr/lib/aarch64-linux-gnu/libnvidia-ml.so.1:/usr/lib/aarch64-linux-gnu/libnvidia-ml.so.1:ro
      # Full config dir (sparks.json, secrets, gpu-memory)
      - ./config:/app/config
    privileged: true
    environment:
      - PORT=5555
      - LLM_PORT=8888
      - NODE_ENV=development
      - HOST_PROC_PATH=/host/proc
      - HOST_SYS_PATH=/host/sys
      - HOST_ROOT_PATH=/host/root
    networks:
      - sparkdash-net

networks:
  sparkdash-net:
    driver: bridge
